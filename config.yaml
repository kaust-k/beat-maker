grid:
  cols: 8       # beats per measure
  rows: 6       # instrument tracks (configurable)

tempo_bpm: 180.0
camera_id: 1

detector: "orientation"   # "color" | "orientation"

display:
  cell_size: 80  # pixels per cell in warped view

detection:
  tile_threshold: 0.15   # coverage >= this -> tile present
  empty_threshold: 0.05  # coverage <= this -> tile absent
  min_present_frames: 4  # consecutive frames tile must be detected before being accepted
  min_absent_frames: 3   # consecutive frames tile must be absent before being cleared
  # orientation-mode only:
  sat_threshold: 40        # HSV S-channel delta above background to identify a tile (after 'b' capture)
  min_area_ratio: 0.10     # minimum contour area / cell area to count as tile
  h_ratio_threshold: 1.25  # bounding rect w/h above this -> HORIZONTAL
  v_ratio_threshold: 0.80  # bounding rect w/h below this -> VERTICAL

selector:
  rows: 1   # height of profile selector strip (in grid cells), placed above the beat grid

profiles:
