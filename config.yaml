sounds:
  dir: assets/sounds
  normalize: true       # RMS-normalize all samples at load time
  target_rms_db: -18.0  # target loudness in dBFS; gain is capped at -1 dBFS peak

colors:                        # used by color detector mode
  red:
    lower: [0, 100, 100]
    upper: [10, 255, 255]
  red_wrap:                    # red wraps around H=0/179 in OpenCV HSV
    lower: [160, 100, 100]
    upper: [179, 255, 255]
  blue:
    lower: [100, 80, 80]
    upper: [130, 255, 255]
  green:
    lower: [40, 60, 60]
    upper: [80, 255, 255]
  yellow:
    lower: [20, 100, 100]
    upper: [35, 255, 255]
  orange:
    lower: [10, 100, 100]
    upper: [20, 255, 255]
  purple:
    lower: [130, 60, 60]
    upper: [160, 255, 255]
