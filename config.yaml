grid:
  cols: 8       # beats per measure
  rows: 6       # instrument tracks (configurable)

tempo_bpm: 180.0
camera_id: 1

detector: "orientation"   # "color" | "orientation"

display:
  cell_size: 80  # pixels per cell in warped view

detection:
  tile_threshold: 0.15   # coverage >= this -> tile present
  empty_threshold: 0.05  # coverage <= this -> tile absent
  # orientation-mode only:
  sat_threshold: 40        # HSV S-channel minimum to identify any colored tile
  min_area_ratio: 0.10     # minimum contour area / cell area to count as tile
  h_ratio_threshold: 1.25  # bounding rect w/h above this -> HORIZONTAL
  v_ratio_threshold: 0.80  # bounding rect w/h below this -> VERTICAL

selector:
  rows: 1   # height of profile selector strip (in grid cells), placed above the beat grid

profiles:
  - name: "Kit A"
    color_bgr: [40, 40, 220]   # BGR color for selector overlay (red)
    tracks:
      - name: kick
        color: red
        file: Kick_Fistpump.wav       # fallback if file_h / file_v not set; null = synthesize
        file_h: null     # null = use 'file' or synthesize
        file_v: null     # null = use 'file' as accent source or _make_accent(h_sound)
      - name: snare
        color: blue
        file: Snare_Analog.wav
        file_h: null
        file_v: null
      - name: hihat
        color: green
        file: Hats_Massamolla.wav
        file_h: null
        file_v: null
      - name: clap
        color: yellow
        file: Clap_Liquid.wav
        file_h: null
        file_v: null
      - name: tom
        color: orange
        file: Perc_Tambo.wav
        file_h: null
        file_v: null
      - name: cymbal
        color: purple
        file: bongo_high_pitch_hit_yT1.wav
        file_h: null
        file_v: null

  - name: "Kit B"
    color_bgr: [40, 220, 40]   # BGR color for selector overlay (green)
    tracks:
      - name: kick
        color: red
        file: null
        file_h: null
        file_v: null
      - name: snare
        color: blue
        file: null
        file_h: null
        file_v: null
      - name: hihat
        color: green
        file: null
        file_h: null
        file_v: null
      - name: clap
        color: yellow
        file: null
        file_h: null
        file_v: null
      - name: tom
        color: orange
        file: null
        file_h: null
        file_v: null
      - name: cymbal
        color: purple
        file: null
        file_h: null
        file_v: null

sounds:
  dir: assets/sounds
  normalize: false       # RMS-normalize all samples at load time
  target_rms_db: -18.0  # target loudness in dBFS; gain is capped at -1 dBFS peak

colors:                        # used by color detector mode
  red:
    lower: [0, 100, 100]
    upper: [10, 255, 255]
  red_wrap:                    # red wraps around H=0/179 in OpenCV HSV
    lower: [160, 100, 100]
    upper: [179, 255, 255]
  blue:
    lower: [100, 80, 80]
    upper: [130, 255, 255]
  green:
    lower: [40, 60, 60]
    upper: [80, 255, 255]
  yellow:
    lower: [20, 100, 100]
    upper: [35, 255, 255]
  orange:
    lower: [10, 100, 100]
    upper: [20, 255, 255]
  purple:
    lower: [130, 60, 60]
    upper: [160, 255, 255]
