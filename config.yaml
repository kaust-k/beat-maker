grid:
  cols: 8       # beats per measure
  rows: 6       # instrument tracks (configurable)

tempo_bpm: 120.0
camera_id: 1

detector: "orientation"   # "color" | "orientation"

display:
  cell_size: 80  # pixels per cell in warped view

detection:
  tile_threshold: 0.15   # coverage >= this -> tile present
  empty_threshold: 0.05  # coverage <= this -> tile absent
  # orientation-mode only:
  sat_threshold: 40        # HSV S-channel minimum to identify any colored tile
  min_area_ratio: 0.10     # minimum contour area / cell area to count as tile
  h_ratio_threshold: 1.25  # bounding rect w/h above this -> HORIZONTAL
  v_ratio_threshold: 0.80  # bounding rect w/h below this -> VERTICAL

sounds:
  dir: assets/sounds
  tracks:
    - name: kick
      color: red
      file_h: null   # null = synthesized; set to filename for custom sound
      file_v: null   # null = 85% volume variant of file_h
    - name: snare
      color: blue
      file_h: null
      file_v: null
    - name: hihat
      color: green
      file_h: null
      file_v: null
    - name: clap
      color: yellow
      file_h: null
      file_v: null
    - name: tom
      color: orange
      file_h: null
      file_v: null
    - name: cymbal
      color: purple
      file_h: null
      file_v: null

colors:                        # used by color detector mode
  red:
    lower: [0, 100, 100]
    upper: [10, 255, 255]
  red_wrap:                    # red wraps around H=0/179 in OpenCV HSV
    lower: [160, 100, 100]
    upper: [179, 255, 255]
  blue:
    lower: [100, 80, 80]
    upper: [130, 255, 255]
  green:
    lower: [40, 60, 60]
    upper: [80, 255, 255]
  yellow:
    lower: [20, 100, 100]
    upper: [35, 255, 255]
  orange:
    lower: [10, 100, 100]
    upper: [20, 255, 255]
  purple:
    lower: [130, 60, 60]
    upper: [160, 255, 255]
